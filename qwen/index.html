<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>教會鋼琴訓練系統</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <h1>🎹 教會鋼琴訓練系統</h1>
      <select id="songSelect"><option value="">載入中...</option></select>
    </header>

    <div class="controls">
      <select id="keySelect">
        <option value="C">C</option><option value="D">D</option><option value="E">E</option>
        <option value="F">F</option><option value="G" selected>G</option><option value="A">A</option>
      </select>
      <select id="patternSelect">
        <option value="block"> 柱式</option>
        <option value="broken">🌊 分解</option>
        <option value="rhythmic"> 節奏</option>
      </select>
      <button id="btnSlow" class="ctrl-btn">🐌 慢速</button>
      <button id="btnLoop" class="ctrl-btn">🔁 循環</button>
      <button id="btnPrev" class="ctrl-btn">⏮ 上一節</button>
      <button id="btnNext" class="ctrl-btn primary">⏭ 下一節</button>
    </div>

    <main class="practice-area" id="practiceArea">
      <div class="chord-progression" id="chordProgression">
        <!-- 動態生成：[G] → [C] → [D7] -->
      </div>
      <div class="current-chord" id="currentChord">G</div>
      <div class="lyrics" id="lyrics">奇異恩典，何等甘甜</div>
      
      <div class="rhythm-grid" id="rhythmGrid">
        <!-- 動態生成節奏點 ● ○ ○ ○ -->
      </div>
      <div class="hint" id="hint">第1拍彈完整和弦，其餘拍休止或輕帶根音</div>
    </main>

    <footer class="feedback-panel" id="feedbackPanel">
      <button id="btnConfirm" class="feedback-btn">✅ 已彈奏（記錄反應時間）</button>
      <div class="metrics">
        <span>反應時間: <b id="reactionTime">-</b> ms</span>
        <span>準確度: <b id="accuracy">-</b> %</span>
      </div>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
